<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#C19A6B" stroke-width="2">
  <!-- Llama estilizada (fuego de Elías) -->
  <path d="M50 10C50 10 30 40 30 55C30 65 38 72 50 72C62 72 70 65 70 55C70 40 50 10 50 10Z" 
        fill="url(#flameGradient)" 
        stroke="#C19A6B" 
        stroke-width="1.5"/>
  
  <!-- Nodo de red neuronal en el centro -->
  <circle cx="50" cy="50" r="8" fill="none" stroke="#C19A6B" stroke-width="2"/>
  <circle cx="50" cy="50" r="3" fill="#C19A6B"/>
  
  <!-- Circuitos que irradian desde el centro -->
  <path d="M50 42V35M50 65V58M42 50H35M65 50H58" stroke="#C19A6B" stroke-width="1.5"/>
  <circle cx="50" cy="35" r="2" fill="#C19A6B"/>
  <circle cx="50" cy="65" r="2" fill="#C19A6B"/>
  <circle cx="35" cy="50" r="2" fill="#C19A6B"/>
  <circle cx="65" cy="50" r="2" fill="#C19A6B"/>
  
  <!-- Conexiones diagonales -->
  <path d="M56 44L61 39M39 61L44 56M44 44L39 39M61 61L56 56" stroke="#C19A6B" stroke-width="1.5"/>
  
  <!-- Gradiente para la llama -->
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#C19A6B;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#C19A6B;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#C19A6B;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Resplandor exterior -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#C19A6B" stroke-width="0.5" opacity="0.3"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#C19A6B" stroke-width="0.3" opacity="0.2"/>
</svg>